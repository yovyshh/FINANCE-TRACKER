{% load static %}
{% include 'header.html' %}
<link rel="stylesheet" href="{% static 'css/add_expense.css' %}">

<div class="body1">
    <div class="card">
        <h2>Add Expense</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <h3>Budgets:</h3>
            <fieldset>
                <div class="checkbox-list">
                    {% for budget in budgets %}
                        <div class="checkbox-item">
                            <label>
                                <input type="checkbox" name="budget_ids[]" value="{{ budget.id }}" 
                                {% if budget.id in selected_budget_ids %}checked{% endif %}>
                                {{ budget.name }}
                            </label>
                        </div>
                    {% endfor %}
                </div>
            </fieldset>
            <button type="submit" class="btn btn-primary">Add Expense</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const categoryField = document.getElementById('id_category');
        const subcategoryField = document.getElementById('id_subcategory');
    
        if (categoryField && subcategoryField) {
            categoryField.addEventListener('change', function () {
                const categoryId = categoryField.value;
    
                if (!categoryId) {
                    subcategoryField.innerHTML = '<option value="">Select a subcategory</option>';
                    return;
                }
    
                fetch(`/get_subcategories/${categoryId}/`, {
                    method: 'GET',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    subcategoryField.innerHTML = '<option value="">Select a subcategory</option>';
                    data.subcategories.forEach(sub => {
                        const option = document.createElement('option');
                        option.value = sub.id;
                        option.textContent = sub.name;
                        subcategoryField.appendChild(option);
                    });
                })
                .catch(() => alert('Failed to load subcategories.'));
            });
        }
    });
</script>

{% include 'footer.html' %}
