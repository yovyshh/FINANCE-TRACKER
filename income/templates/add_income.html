{% load static %}
{% include 'header.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/add_income.css' %}">
    <title>Add Income</title>
</head>
<body>
    <div class="body1">
        <div class="card">
            <h1>Add Income</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const categoryField = document.getElementById('id_category');
            const subcategoryField = document.getElementById('id_subcategory');

            if (categoryField) {
                categoryField.addEventListener('change', function () {
                    const categoryId = categoryField.value;

                    if (!categoryId) {
                        subcategoryField.innerHTML = '<option value="">Select a subcategory</option>';
                        return;
                    }

                    // Fetch subcategories for the selected category
                    fetch(`/get_subcategories/${categoryId}/`)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Failed to fetch subcategories');
                            }
                            return response.json();
                        })
                        .then(data => {
                            subcategoryField.innerHTML = '<option value="">Select a subcategory</option>';
                            data.subcategories.forEach(sub => {
                                const option = document.createElement('option');
                                option.value = sub.id;
                                option.textContent = sub.name;
                                subcategoryField.appendChild(option);
                            });
                        })
                        .catch(error => {
                            console.error('Error:', error);
                            alert('Failed to load subcategories. Please try again.');
                        });
                });
            }
        });
    </script>
</body>
</html>
{% include 'footer.html' %}
