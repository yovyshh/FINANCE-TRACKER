<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
      body {
          background-color: #6a0dad;
          font-family: Arial, sans-serif;
          color: white;
          text-align: center;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
      }

      .container {
          background-color: #7b1fa2;
          padding: 40px;
          border-radius: 10px;
          width: 300px;
          box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      }

      .container img {
          max-width: 100px;
          margin-bottom: 20px;
      }

      h2 {
          margin-bottom: 20px;
      }

      form {
          display: flex;
          flex-direction: column;
      }

      label {
          text-align: left;
          margin-bottom: 5px;
      }

      input {
          padding: 10px;
          margin-bottom: 15px;
          border: none;
          border-radius: 5px;
      }

      button {
          padding: 10px;
          background-color: #ff9800;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
      }

      button:hover {
          background-color: #e68900;
      }

      p {
          margin-top: 15px;
      }

      a {
          color: #ffeb3b;
          text-decoration: none;
      }

      a:hover {
          text-decoration: underline;
      }
    </style>
</head>
<body>
    <div class="container">
        <img src="C:\Users\vaish\Videos\project_1\myproject\user\static\images\refer.png" alt="App Logo">
        <h2>Sign In</h2>
        <form action="/signin" method="POST">
            {% csrf_token %}
            {{form.as_p}}
            <!-- <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Sign In</button> -->
            
            
        </form>
        

       
    </div>
</body>
</html>
