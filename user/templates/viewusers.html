
{% include 'header.html'%}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Users</title>
  <style>
    table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border: 1px solid #ddd;
      background-color: white;
    }
    
    h1 {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>View Users</h1>
  <table>
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Contact</th>
    </tr>
    {% for user in a %}
    <tr>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.contact }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3" style="text-align: center;">No users found.</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
