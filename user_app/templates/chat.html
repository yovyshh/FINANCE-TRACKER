{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/chat.css' %}">
    <script src="https://kit.fontawesome.com/YOUR_FONT_AWESOME_KIT.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="chat-container">
    <div id="chat-box">
        <div id="chat-header">
            <h5 class="mb-0"> Chat</h5>
        </div>
        <div id="chat-messages">
            <div class="message admin">
                <p>Welcome! How can I assist you today?</p>
            </div>
        </div>
        <div id="chat-footer">
            <input type="text" id="chat-input" placeholder="Type a message..." class="form-control">
            <button id="send-btn" class="btn btn-success"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    document.getElementById("send-btn").addEventListener("click", function () {
        let message = document.getElementById("chat-input").value.trim();
        if (message !== "") {
            let chatMessages = document.getElementById("chat-messages");

            // Display user message
            chatMessages.innerHTML += `<div class="message user"><p>${message}</p></div>`;
            document.getElementById("chat-input").value = "";
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Send message to backend
            fetch("chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                if (data.reply) {
                    chatMessages.innerHTML += `<div class="message admin"><p>${data.reply}</p></div>`;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            })
            .catch(error => console.error("Error:", error));
        }
    });
</script>

<style>
    body {
        background: linear-gradient(to bottom, #1a495d, #B3D9FF);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .chat-container {
        width:1000px;
        
        max-width: 90%;
    }

    #chat-box {
        background: white;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 400px;
    }

    #chat-header {
        background: #007bff;
        color: white;
        padding: 10px;
        text-align: center;
    }

    #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
    }

    #chat-footer {
        display: flex;
        padding: 10px;
    }

    #chat-footer input {
        flex: 1;
        padding: 5px;
        border: 1px solid #ddd;
    }

    #chat-footer button {
        margin-left: 5px;
        background: #28a745;
        color: white;
        border: none;
        padding: 25px 25px;
        cursor: pointer;
    }

    .message {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        max-width: 80%;
    }

    .user {
        background: #dcf8c6;
        align-self: flex-end;
    }

    .admin {
        background: #f1f0f0;
        align-self: flex-start;
    }
</style>

</body>
</html>
