{% load static %}

{% include 'header.html' %}
<!DOCTYPE html> 
<html lang="en"> 
  <head> 
      <meta charset="UTF-8"> 
      <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
      <title>Reset Form</title> 
      <link rel="stylesheet" href="{% static 'css/style.css' %}"/> 
  </head>
  <body>
    <style>
      /* Body styling */
      .body {
        background: linear-gradient(to bottom, rgb(67, 76, 83), #000000);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      /* Container for form */
      .reset-container {
        background-color: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        width: 400px;
        text-align: center;
        margin-top: 2px;
      }

      /* Form elements */
      .reset-container h2 {
        color: #ffffff;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .Reset-form input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      .Reset-form button {
        background-color: #007bff;
        color: #ffffff;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      .Reset-form button:hover {
        background-color: #0056b3;
      }
    </style>

    <div class="body">
      <div class="reset-container"> 
        <h2>Change password</h2>
        <form class="Reset-form" method="post">
          {% csrf_token %}
          {{ form.as_p }} 
          <button type="submit">Change password</button>
        </form>
      </div>
    </div>
    
    {% include 'footer.html' %}
  </body>
</html>
