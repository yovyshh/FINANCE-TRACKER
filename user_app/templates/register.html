{% load static %}
{% include 'header.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link rel="stylesheet" href="{% static 'css/reg.css' %}" />
    <script src="{% static 'fonts/script.js' %}" defer></script> <!-- Correct path for the JS file -->
</head>
<body>
    <div class="body">
        <div class="register-container1">
            <form class="Reg-form" action="/register" method="POST" enctype="multipart/form-data" onsubmit="return validatePassword()">
                <h2>Register</h2>
                {% csrf_token %}
                
                <!-- Displaying the form fields -->
                <div class="form-fields">
                    {% for field in form %}
                        <div class="form-field">
                            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }} <!-- Display the field -->
                            {% if field.errors %}
                                <ul class="error-list">
                                    {% for error in field.errors %}
                                        <li>{{ error }}</li>
                                    {% endfor %}
                                </ul>
                            {% endif %}
                        </div>
                    {% endfor %}
                </div>

                <button type="submit">Register</button>
            </form>
        </div>
    </div>
    
    {% include 'footer.html' %}
</body>
</html>
